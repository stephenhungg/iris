name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd frontend && bun install --frozen-lockfile && bunx tsc --noEmit

  cli-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          cd cli
          pip install -e ".[test]"
          NO_COLOR=1 python -m pytest tests/ -v
        env:
          NO_COLOR: "1"

  backend-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -c "
          import ast, pathlib, sys
          errors = []
          for f in pathlib.Path('backend/app').rglob('*.py'):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print('all backend files parse OK')
          "
