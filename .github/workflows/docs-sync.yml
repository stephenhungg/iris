name: Auto-update docs

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install google-genai

      - name: Check for code changes that affect docs
        id: check
        run: |
          # get files changed in this push
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -vE '^docs/' | grep -vE '^\.' || true)
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "no non-docs files changed, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "changed files:"
            echo "$CHANGED"
          fi

      - name: Generate doc updates
        if: steps.check.outputs.skip != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python << 'PYEOF'
          import json
          import os
          import subprocess
          from pathlib import Path
          from google import genai

          api_key = os.environ["GEMINI_API_KEY"]
          client = genai.Client(api_key=api_key)

          # get the diff
          diff = subprocess.run(
              ["git", "diff", "HEAD~1", "HEAD", "--", ".", ":!docs/"],
              capture_output=True, text=True
          ).stdout

          if not diff.strip():
              print("no relevant diff found")
              exit(0)

          # read current docs
          docs_dir = Path("docs")
          current_docs = {}
          for f in docs_dir.rglob("*.mdx"):
              rel = str(f.relative_to(docs_dir))
              current_docs[rel] = f.read_text()

          docs_json = (docs_dir / "docs.json").read_text()

          prompt = f"""You are a documentation maintenance agent for the iris video editor.

          Below is a git diff of code changes that were just pushed. Your job is to check
          if any existing documentation needs to be updated to reflect these changes.

          CURRENT DOCS STRUCTURE (docs.json):
          {docs_json}

          CURRENT DOC FILES:
          {json.dumps({k: v[:500] + "..." if len(v) > 500 else v for k, v in current_docs.items()}, indent=2)}

          GIT DIFF:
          {diff[:15000]}

          INSTRUCTIONS:
          1. Analyze the diff for changes that affect documentation:
             - New API endpoints
             - Changed request/response schemas
             - New features or components
             - Architecture changes
             - New CLI commands
             - Changed deployment or setup steps

          2. If docs need updating, return a JSON object with file updates:
          {{
            "updates": [
              {{
                "file": "reference/backend-api.mdx",
                "reason": "new agent chat endpoint added",
                "content": "full updated file content here"
              }}
            ],
            "new_files": [
              {{
                "file": "reference/agent-api.mdx",
                "title": "Agent Chat API",
                "description": "SSE streaming agent chat endpoint",
                "content": "full file content with frontmatter",
                "nav_group": "Reference"
              }}
            ],
            "summary": "one-line summary of what changed"
          }}

          3. If no docs need updating, return:
          {{"updates": [], "new_files": [], "summary": "no doc updates needed"}}

          RULES:
          - Only update docs that are actually affected by the diff
          - Keep the existing writing style and formatting
          - Use mintlify MDX format with --- frontmatter
          - Be conservative — don't rewrite docs that are still accurate
          - For API docs, include method, path, request body, and response shape
          - Return ONLY the JSON object, no markdown wrapping

          Return the JSON object now."""

          response = client.models.generate_content(
              model="gemini-2.5-flash",
              contents=prompt,
              config=genai.types.GenerateContentConfig(
                  response_mime_type="application/json",
                  temperature=0.2,
              ),
          )

          text = response.text.strip()
          if text.startswith("```"):
              text = text.split("\n", 1)[1].rsplit("```", 1)[0].strip()

          result = json.loads(text)

          if not result.get("updates") and not result.get("new_files"):
              print(f"no doc updates needed: {result.get('summary', '')}")
              exit(0)

          print(f"doc updates: {result.get('summary', '')}")

          # apply updates
          for update in result.get("updates", []):
              path = docs_dir / update["file"]
              print(f"  updating {path}: {update['reason']}")
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(update["content"])

          # create new files
          for new_file in result.get("new_files", []):
              path = docs_dir / new_file["file"]
              print(f"  creating {path}: {new_file.get('title', '')}")
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(new_file["content"])

              # update docs.json navigation if nav_group specified
              if new_file.get("nav_group"):
                  config = json.loads(docs_json)
                  page_ref = new_file["file"].replace(".mdx", "")
                  for group in config.get("navigation", {}).get("groups", []):
                      if group["group"] == new_file["nav_group"]:
                          if page_ref not in group["pages"]:
                              group["pages"].append(page_ref)
                              break
                  (docs_dir / "docs.json").write_text(
                      json.dumps(config, indent=2) + "\n"
                  )

          # write a marker for the commit step
          Path("/tmp/docs_updated").write_text(result.get("summary", "docs updated"))
          PYEOF

      - name: Commit and push doc updates
        if: steps.check.outputs.skip != 'true'
        run: |
          if [ ! -f /tmp/docs_updated ]; then
            echo "no doc updates generated"
            exit 0
          fi

          SUMMARY=$(cat /tmp/docs_updated)
          git config user.name "iris-docs-bot"
          git config user.email "docs@useiris.tech"
          git add docs/

          # check if there are actual changes
          if git diff --staged --quiet; then
            echo "no doc changes to commit"
            exit 0
          fi

          git commit -m "docs: auto-update — $SUMMARY"
          git push
