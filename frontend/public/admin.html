<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iris / admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Instrument+Serif&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050507;
    color: #c8c8d0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    line-height: 1.5;
  }

  .header {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 20px 24px 16px;
    border-bottom: 1px solid #1a1a24;
  }
  .header h1 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400; font-size: 24px; color: #fff;
  }
  .header .status {
    display: flex; align-items: center; gap: 8px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.ok { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
  .dot.err { background: #ef4444; box-shadow: 0 0 6px #ef444488; }
  .dot.waiting { background: #666; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 1px;
    background: #1a1a24;
    border-bottom: 1px solid #1a1a24;
  }
  .stat {
    background: #050507;
    padding: 16px 20px;
  }
  .stat .label { color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .stat .value { font-size: 28px; font-weight: 600; color: #fff; margin-top: 4px; }
  .stat .sub { color: #555; font-size: 11px; margin-top: 2px; }

  .panels {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 1px;
    background: #1a1a24;
    min-height: calc(100vh - 160px);
  }

  .feed {
    background: #050507;
    overflow-y: auto;
    max-height: calc(100vh - 160px);
  }
  .feed-header {
    padding: 12px 20px;
    color: #666; font-size: 10px;
    text-transform: uppercase; letter-spacing: 1px;
    border-bottom: 1px solid #1a1a24;
    position: sticky; top: 0; background: #050507; z-index: 1;
  }

  .event {
    padding: 8px 20px;
    border-bottom: 1px solid #0d0d14;
    display: grid;
    grid-template-columns: 60px 1fr 80px 70px 60px;
    gap: 8px;
    align-items: center;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } }
  .event:hover { background: #0a0a12; }
  .event .ts { color: #555; }
  .event .op { color: #c8c8d0; }
  .event .op .svc { color: #888; }
  .event .dur { text-align: right; }
  .event .dur.fast { color: #22c55e; }
  .event .dur.med { color: #f59e0b; }
  .event .dur.slow { color: #ef4444; }
  .event .cost { color: #555; text-align: right; }
  .event .badge {
    font-size: 10px; padding: 2px 6px; border-radius: 3px;
    text-align: center;
  }
  .badge.ok { color: #22c55e; background: #22c55e15; }
  .badge.error { color: #ef4444; background: #ef444415; }

  .sidebar {
    background: #050507;
    padding: 0;
    overflow-y: auto;
    max-height: calc(100vh - 160px);
  }
  .sidebar-section {
    padding: 12px 16px;
    border-bottom: 1px solid #1a1a24;
  }
  .sidebar-section .title {
    color: #666; font-size: 10px;
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .svc-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 0;
  }
  .svc-row .name { color: #c8c8d0; }
  .svc-row .count { color: #888; }
  .svc-row .latency { color: #555; font-size: 11px; }

  .bar-chart {
    display: flex; flex-direction: column; gap: 4px;
  }
  .bar-row {
    display: flex; align-items: center; gap: 8px;
  }
  .bar-label { width: 100px; color: #888; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar {
    height: 14px; border-radius: 2px;
    transition: width 0.5s ease;
    min-width: 2px;
  }
  .bar.gemini { background: #6366f1; }
  .bar.veo { background: #8b5cf6; }
  .bar.elevenlabs { background: #ec4899; }
  .bar.gpu { background: #22c55e; }

  .pipeline {
    display: flex; gap: 4px; flex-wrap: wrap;
  }
  .pipe-step {
    font-size: 10px; padding: 3px 8px; border-radius: 3px;
    border: 1px solid #1a1a24; color: #555;
    transition: all 0.3s;
  }
  .pipe-step.active { border-color: #6366f1; color: #6366f1; background: #6366f115; }
  .pipe-step.done { border-color: #22c55e; color: #22c55e; background: #22c55e15; }
  .pipe-step.err { border-color: #ef4444; color: #ef4444; background: #ef444415; }
</style>
</head>
<body>
  <div class="header">
    <h1>iris <span style="color:#555;font-family:'IBM Plex Mono';font-size:13px;margin-left:8px;">admin</span></h1>
    <div class="status">
      <div class="dot waiting" id="conn-dot"></div>
      <span id="conn-status" style="color:#666;">connecting...</span>
    </div>
  </div>

  <div class="grid">
    <div class="stat">
      <div class="label">total calls</div>
      <div class="value" id="total-calls">0</div>
      <div class="sub" id="calls-rate">0/min</div>
    </div>
    <div class="stat">
      <div class="label">errors</div>
      <div class="value" id="total-errors">0</div>
      <div class="sub" id="error-rate">0%</div>
    </div>
    <div class="stat">
      <div class="label">est. cost</div>
      <div class="value" id="total-cost">$0.00</div>
      <div class="sub" id="cost-rate">$0.00/min</div>
    </div>
    <div class="stat">
      <div class="label">uptime</div>
      <div class="value" id="uptime">0s</div>
      <div class="sub" id="gpu-status">gpu: checking...</div>
    </div>
  </div>

  <div class="panels">
    <div class="feed">
      <div class="feed-header">live event feed</div>
      <div id="feed-list"></div>
    </div>

    <div class="sidebar">
      <div class="sidebar-section">
        <div class="title">pipeline</div>
        <div class="pipeline" id="pipeline">
          <div class="pipe-step" data-step="edit_plan">edit plan</div>
          <div class="pipe-step" data-step="generate_variant">generate</div>
          <div class="pipe-step" data-step="score_variant">score</div>
          <div class="pipe-step" data-step="identify_entity">entity id</div>
          <div class="pipe-step" data-step="search_keyframes">search</div>
          <div class="pipe-step" data-step="narration_script">narrate</div>
          <div class="pipe-step" data-step="narrate">tts</div>
          <div class="pipe-step" data-step="sam_segment">sam</div>
          <div class="pipe-step" data-step="clip_embed">clip</div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="title">service breakdown</div>
        <div id="svc-breakdown"></div>
      </div>

      <div class="sidebar-section">
        <div class="title">latency distribution</div>
        <div class="bar-chart" id="latency-bars"></div>
      </div>
    </div>
  </div>

<script>
const API_BASE = window.location.hostname === 'admin.useiris.tech'
  ? 'https://useiris.tech/api/ai'
  : '/api/ai';

const feedList = document.getElementById('feed-list');
const MAX_EVENTS = 200;
let events = [];
let startTime = Date.now();
let totalCalls = 0;
let totalErrors = 0;
let totalCost = 0;

function formatDur(s) {
  if (s < 1) return (s * 1000).toFixed(0) + 'ms';
  return s.toFixed(1) + 's';
}

function durClass(s) {
  if (s < 2) return 'fast';
  if (s < 10) return 'med';
  return 'slow';
}

function formatUptime(s) {
  if (s < 60) return Math.floor(s) + 's';
  if (s < 3600) return Math.floor(s / 60) + 'm';
  return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm';
}

function addEvent(ev) {
  events.unshift(ev);
  if (events.length > MAX_EVENTS) events.pop();

  totalCalls++;
  if (ev.status === 'error') totalErrors++;
  totalCost = ev.total_cost || totalCost;

  // update stats
  document.getElementById('total-calls').textContent = totalCalls;
  document.getElementById('total-errors').textContent = totalErrors;
  document.getElementById('error-rate').textContent =
    totalCalls > 0 ? (totalErrors / totalCalls * 100).toFixed(1) + '%' : '0%';
  document.getElementById('total-cost').textContent = '$' + totalCost.toFixed(3);

  const elapsed = (Date.now() - startTime) / 60000;
  document.getElementById('calls-rate').textContent =
    elapsed > 0.5 ? (totalCalls / elapsed).toFixed(1) + '/min' : '--';
  document.getElementById('cost-rate').textContent =
    elapsed > 0.5 ? '$' + (totalCost / elapsed).toFixed(3) + '/min' : '--';

  // pipeline highlight
  document.querySelectorAll('.pipe-step').forEach(el => {
    if (el.dataset.step === ev.operation) {
      el.className = 'pipe-step ' + (ev.status === 'ok' ? 'done' : 'err');
      setTimeout(() => { el.className = 'pipe-step'; }, 3000);
    }
  });

  renderFeed();
  updateSidebar();
}

function renderFeed() {
  const html = events.slice(0, 100).map(ev => `
    <div class="event">
      <span class="ts">${ev.ts?.toFixed(1) || '0'}s</span>
      <span class="op"><span class="svc">${ev.service}.</span>${ev.operation}</span>
      <span class="dur ${durClass(ev.duration_s)}">${formatDur(ev.duration_s)}</span>
      <span class="cost">$${(ev.cost || 0).toFixed(3)}</span>
      <span class="badge ${ev.status}">${ev.status}</span>
    </div>
  `).join('');
  feedList.innerHTML = html;
}

function updateSidebar() {
  // aggregate by service
  const byService = {};
  events.forEach(ev => {
    const key = ev.service;
    if (!byService[key]) byService[key] = { calls: 0, errors: 0, totalLat: 0, maxLat: 0 };
    byService[key].calls++;
    if (ev.status === 'error') byService[key].errors++;
    byService[key].totalLat += ev.duration_s;
    byService[key].maxLat = Math.max(byService[key].maxLat, ev.duration_s);
  });

  const breakdown = document.getElementById('svc-breakdown');
  breakdown.innerHTML = Object.entries(byService).map(([name, s]) => `
    <div class="svc-row">
      <span class="name">${name}</span>
      <span class="count">${s.calls} calls</span>
      <span class="latency">avg ${formatDur(s.totalLat / s.calls)}</span>
    </div>
  `).join('');

  // latency bars
  const bars = document.getElementById('latency-bars');
  const maxLat = Math.max(...Object.values(byService).map(s => s.maxLat), 1);
  const colors = { gemini: 'gemini', veo: 'veo', elevenlabs: 'elevenlabs', gpu: 'gpu' };
  bars.innerHTML = Object.entries(byService).map(([name, s]) => {
    const avg = s.totalLat / s.calls;
    const pct = (avg / maxLat) * 100;
    const color = colors[name] || 'gemini';
    return `
      <div class="bar-row">
        <span class="bar-label">${name}</span>
        <div class="bar ${color}" style="width:${Math.max(pct, 2)}%"></div>
        <span style="color:#555;font-size:11px">${formatDur(avg)}</span>
      </div>
    `;
  }).join('');
}

// SSE connection
function connect() {
  const dot = document.getElementById('conn-dot');
  const status = document.getElementById('conn-status');

  const es = new EventSource(API_BASE + '/stream');

  es.addEventListener('init', (e) => {
    const data = JSON.parse(e.data);
    totalCalls = data.total_calls || 0;
    totalErrors = data.total_errors || 0;
    totalCost = data.total_estimated_cost || 0;
    document.getElementById('total-calls').textContent = totalCalls;
    document.getElementById('total-errors').textContent = totalErrors;
    document.getElementById('total-cost').textContent = '$' + totalCost.toFixed(3);
    document.getElementById('uptime').textContent = formatUptime(data.uptime_s || 0);

    if (data.gpu_worker_available) {
      document.getElementById('gpu-status').textContent = 'gpu: connected';
      document.getElementById('gpu-status').style.color = '#22c55e';
    } else {
      document.getElementById('gpu-status').textContent = 'gpu: offline';
      document.getElementById('gpu-status').style.color = '#ef4444';
    }

    dot.className = 'dot ok';
    status.textContent = 'connected';
    status.style.color = '#22c55e';
  });

  es.onmessage = (e) => {
    const event = JSON.parse(e.data);
    addEvent(event);
  };

  es.onerror = () => {
    dot.className = 'dot err';
    status.textContent = 'disconnected';
    status.style.color = '#ef4444';
    es.close();
    setTimeout(connect, 3000);
  };
}

// uptime ticker
setInterval(() => {
  const elapsed = (Date.now() - startTime) / 1000;
  document.getElementById('uptime').textContent = formatUptime(elapsed);
}, 1000);

connect();
</script>
</body>
</html>
