<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- iris aperture shape — black fill for MetallicPaint -->
  <g fill="#000000">
    <!-- outer ring -->
    <circle cx="250" cy="250" r="220" fill="none" stroke="#000000" stroke-width="8"/>
    <!-- aperture blades -->
    <path d="M250 30 C350 30 450 130 470 250 L370 250 C360 170 320 100 250 80 Z"/>
    <path d="M470 250 C470 350 370 450 250 470 L250 370 C330 360 400 320 420 250 Z"/>
    <path d="M250 470 C150 470 50 370 30 250 L130 250 C140 330 180 400 250 420 Z"/>
    <path d="M30 250 C30 150 130 50 250 30 L250 130 C170 140 100 180 80 250 Z"/>
    <!-- center pupil -->
    <circle cx="250" cy="250" r="60"/>
    <!-- inner ring -->
    <circle cx="250" cy="250" r="120" fill="none" stroke="#000000" stroke-width="4"/>
  </g>
</svg>
