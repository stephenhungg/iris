services:
  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
        VITE_SUPABASE_REDIRECT: ${VITE_SUPABASE_REDIRECT:-}
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-}
    env_file:
      - ../.env
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://iris:iris@db:5432/iris}
      GPU_WORKER_URL: ${GPU_WORKER_URL:-http://gpu-worker:8001}
      USE_AI_STUBS: ${USE_AI_STUBS:-true}
    volumes:
      - storage:/app/storage
    depends_on:
      - db

  gpu-worker:
    profiles: ["gpu"]
    build:
      context: ..
      dockerfile: infra/Dockerfile.gpu
    ports:
      - "8001:8001"
    volumes:
      - ../gpu-worker/checkpoints:/app/checkpoints:ro

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: iris
      POSTGRES_PASSWORD: iris
      POSTGRES_DB: iris
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  storage:
  pgdata:
