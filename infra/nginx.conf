server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # gzip everything
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    # vite-hashed assets (js, css, fonts, images) — cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # static files (favicon, robots, sitemap, opengraph) — cache 1 day
    location ~* \.(svg|png|jpg|ico|webp|woff2|woff|ttf|xml|txt)$ {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback — no cache on index.html so deploys take effect
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # proxy API to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        client_max_body_size 500M;

        # SSE support (agent chat)
        proxy_set_header Upgrade $http_upgrade;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
